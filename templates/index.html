<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Database</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 850px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 { color: #003d7a; }
        nav a {
            margin-right: 15px;
            color: #0057a8;
            text-decoration: none;
        }
        nav a:hover { text-decoration: underline; }
        .panels {
            display: flex;
            gap: 25px;
            margin-top: 25px;
        }
        .panel {
            flex: 1;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 5px;
            background: #f9f9f9;
        }
        .panel h2 { margin-top: 0; }
        input[type="text"] {
            width: 100%;
            padding: 7px;
            margin-top: 5px;
            box-sizing: border-box;
            border: 1px solid #aaa;
            border-radius: 4px;
        }
        button {
            margin-top: 12px;
            padding: 8px 20px;
            background: #0057a8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #003d7a; }
    </style>
</head>
<body>
    <h1>University Student Database</h1>
    <nav>
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('add_student') }}">Add Student</a>
    </nav>

    <div class="panels">
        <div class="panel">
            <h2>Search by Name</h2>
            <form method="POST" action="{{ url_for('search') }}">
                <input type="hidden" name="search_type" value="name">
                <label for="name_q">Student name:</label>
                <input type="text" id="name_q" name="query" placeholder="e.g. Jones">
                <br>
                <button type="submit">Search</button>
            </form>
        </div>

        <div class="panel">
            <h2>Search by ID</h2>
            <form method="POST" action="{{ url_for('search') }}">
                <input type="hidden" name="search_type" value="id">
                <label for="id_q">Student ID:</label>
                <input type="text" id="id_q" name="query" placeholder="e.g. 12345">
                <br>
                <button type="submit">Search</button>
            </form>
        </div>
    </div>
</body>
</html>
